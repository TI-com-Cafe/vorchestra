name: Feature request
description: Suggest a new capability or enhancement
title: "[feat] "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Lead with the **use case**, not the proposed solution. The clearer the problem, the better the design we can converge on together.

  - type: textarea
    id: usecase
    attributes:
      label: Use case
      description: What are you trying to accomplish? What does your current workflow look like?
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem with the current behavior
      description: Why does today's VOrchestra not solve this for you?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution (optional)
      description: If you have a concrete idea, share it here. It is fine to leave blank — we may converge on a different design.

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other tools, workarounds, or approaches you have tried.

  - type: dropdown
    id: scope
    attributes:
      label: Rough scope
      options:
        - Small (UI tweak, single command)
        - Medium (new Studio panel, new Tauri command)
        - Large (cross-cutting, schema change, new engine)
        - Not sure
    validations:
      required: true

  - type: checkboxes
    id: confirm
    attributes:
      label: Confirmation
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: I am willing to help test a draft implementation.
