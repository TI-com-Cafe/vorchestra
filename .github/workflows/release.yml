name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true
        type: string

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
          - platform: ubuntu-latest
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install frontend deps
        run: npm ci

      - name: Build & publish
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: "VOrchestra ${{ github.event.inputs.tag || github.ref_name }}"
          releaseBody: |
            See the [CHANGELOG](./CHANGELOG.md) for details.

            ## Installation
            - **Linux:** `.AppImage` (universal), `.deb` (Debian/Ubuntu), or `.rpm` (Fedora/RHEL/openSUSE)
            - **macOS:** `.dmg` (Apple Silicon and Intel builds available)
            - **Windows:** `.msi` or setup `.exe`

            ## Uninstall
            - **Windows:** Settings → Apps → Installed apps → VOrchestra → Uninstall
            - **macOS:** quit VOrchestra, then delete `VOrchestra.app` from Applications
            - **Linux AppImage:** delete the downloaded `.AppImage`
            - **Linux deb/rpm:** remove through your package manager (`apt remove vorchestra`, `dnf remove VOrchestra`, or equivalent)
          releaseDraft: true
          prerelease: true
          args: ${{ matrix.args }}
