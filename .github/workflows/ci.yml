name: CI

on:
  push:
    branches: ["master", "main"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short

jobs:
  frontend:
    name: Frontend (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: TypeScript check
        run: npm run check:frontend
      - name: Vite build
        run: npm run build

  rust-fmt:
    name: Rust fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: cargo fmt --check
        working-directory: src-tauri
        run: cargo fmt --all -- --check

  rust-clippy:
    name: Rust clippy + check
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev
      - name: cargo check
        working-directory: src-tauri
        run: cargo check --all-targets
      - name: cargo clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings
      - name: cargo test
        if: matrix.os != 'windows-latest'
        working-directory: src-tauri
        run: cargo test --all-targets
      - name: cargo test skipped on Windows
        if: matrix.os == 'windows-latest'
        run: |
          echo "Skipping Rust test execution on Windows because the Tauri/WebView runtime test binary can fail before the harness starts with STATUS_ENTRYPOINT_NOT_FOUND."
          echo "Windows still runs cargo check --all-targets and cargo clippy --all-targets for compile/lint coverage."

  rust-audit:
    name: Rust security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install --locked cargo-audit
      - name: cargo audit
        working-directory: src-tauri
        run: cargo audit --deny warnings
        continue-on-error: true # advisory-only for now; tighten in v0.3
